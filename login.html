<!DOCTYPE html>
<html lang="en">

<head>
    <script src="auth-guard.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Login — Automobili Ardent</title>
    <meta name="description" content="Login to your Automobili Ardent account.">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="login.css">
    <link rel="stylesheet" href="supabase-integration.css">
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700&family=Quantico:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
</head>

<body>
    <!-- Background Video -->
    <div class="login-bg">
        <video class="desktop-only" autoplay loop muted playsinline poster="https://images.unsplash.com/photo-1603584173870-7f23fdae1b7a?auto=format&fit=crop&q=80&w=1920">
            <source src="hero.webm" type="video/webm">
        </video>
        <video class="mobile-only" autoplay loop muted playsinline poster="https://images.unsplash.com/photo-1603584173870-7f23fdae1b7a?auto=format&fit=crop&q=80&w=1920">
            <source src="hero-mobile.webm" type="video/webm">
        </video>
        <div class="login-overlay"></div>
    </div>

    <!-- Login Container -->
    <div class="login-wrapper">
        <div class="login-glass-panel">
            <div class="login-header">
                <a href="index.html">
                    <img src="header-images/header-logo.png" alt="Automobili Ardent" class="login-logo">
                </a>
                <p class="login-sub">Exclusive access awaits</p>
            </div>

            <form class="login-form" action="#" method="POST">
                <div class="form-group">
                    <div class="input-icon-wrapper">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
                        <input type="email" id="email" name="email" placeholder="Email address" required>
                    </div>
                </div>

                <div class="form-group">
                    <div class="input-icon-wrapper">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                        <input type="password" id="password" name="password" placeholder="Password" required>
                        <button type="button" class="btn-toggle-password" aria-label="Toggle password visibility">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                        </button>
                    </div>
                </div>

                <div class="form-options">
                    <label class="remember-me">
                        <input type="checkbox" name="remember">
                        <span class="remember-text">Remember me</span>
                    </label>
                    <a href="#" class="forgot-password hover-target">Forgot password?</a>
                </div>

                <button type="submit" class="btn-primary hover-target btn-login">
                    <span class="text-anim" data-text="ENTER"><span>ENTER</span></span>
                </button>

                <div class="quick-access">
                    <span class="quick-access-text">quick access via</span>
                    <div class="social-login-btns">
                        <button type="button" class="btn-social hover-target" aria-label="Login with Google">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"></path><path d="M2 12h20"></path></svg>
                        </button>
                        <button type="button" class="btn-social hover-target" aria-label="Login with Twitter">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 3a10.9 10.9 0 0 1-3.14 1.53 4.48 4.48 0 0 0-7.86 3v1A10.66 10.66 0 0 1 3 4s-4 9 5 13a11.64 11.64 0 0 1-7 2c9 5 20 0 20-11.5a4.5 4.5 0 0 0-.08-.83A7.72 7.72 0 0 0 23 3z"></path></svg>
                        </button>
                        <button type="button" class="btn-social hover-target" aria-label="Login with Discord/Gaming">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="6" width="20" height="12" rx="2" ry="2"></rect><path d="M6 12h4"></path><path d="M8 10v4"></path><line x1="15" y1="13" x2="15.01" y2="13"></line><line x1="18" y1="11" x2="18.01" y2="11"></line></svg>
                        </button>
                    </div>
                </div>

                <p class="signup-link">
                    Don't have an account? <a href="#" class="hover-target">Create Account</a>
                </p>
            </form>
        </div>
        <div class="login-footer-copy">
            &copy; 2026 Automobili Ardent. All rights reserved.
        </div>
    </div>
    
    </body>
</html>
